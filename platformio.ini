[env:main]
platform = espressif32
; board = lolin_s2_mini
board = esp32-s3-devkitc-1
; board = board
framework = arduino
monitor_speed = 115200
lib_deps = 
	adafruit/Adafruit TLC5947@^1.2.3
	fastled/FastLED@^3.10.1
	bblanchon/ArduinoJson@^7.4.2

